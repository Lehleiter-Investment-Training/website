<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66cc99"/>
      <stop offset="100%" style="stop-color:#4db380"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg2)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(550, 100)">
    <path d="M 100 20 L 100 120 C 100 180 50 220 50 220 C 50 220 0 180 0 120 L 0 20 L 50 0 L 100 20 Z"
          fill="url(#shield)" opacity="0.9"/>
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="50" fill="white" text-anchor="middle" font-weight="bold">%</text>
  </g>

  <!-- Risk meter -->
  <g transform="translate(520, 320)">
    <rect x="0" y="0" width="200" height="20" rx="10" fill="rgba(255,255,255,0.2)"/>
    <rect x="0" y="0" width="80" height="20" rx="10" fill="#66cc99"/>
    <text x="220" y="16" font-family="Arial, sans-serif" font-size="14" fill="#66cc99">LOW RISK</text>
  </g>

  <!-- Title -->
  <rect x="40" y="100" width="4" height="120" fill="url(#shield)" rx="2"/>
  <text x="60" y="150" font-family="Arial, sans-serif" font-size="32" fill="white" font-weight="bold">Risikomanagement</text>
  <text x="60" y="195" font-family="Arial, sans-serif" font-size="28" fill="#66cc99">im Optionshandel</text>

  <!-- Bullet points -->
  <g fill="white" font-family="Arial, sans-serif" font-size="16">
    <circle cx="70" cy="270" r="4" fill="#66cc99"/>
    <text x="90" y="275">Positionsgrößen richtig berechnen</text>
    <circle cx="70" cy="305" r="4" fill="#66cc99"/>
    <text x="90" y="310">Stop-Loss Strategien verstehen</text>
    <circle cx="70" cy="340" r="4" fill="#66cc99"/>
    <text x="90" y="345">Kapital systematisch schützen</text>
  </g>

  <!-- Bottom tag -->
  <rect x="40" y="390" width="180" height="35" rx="17" fill="url(#shield)"/>
  <text x="130" y="413" font-family="Arial, sans-serif" font-size="14" fill="#003366" text-anchor="middle" font-weight="bold">RISIKOMANAGEMENT</text>
</svg>