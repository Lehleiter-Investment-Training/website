<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="iv" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg10)"/>

  <!-- Chart background -->
  <g transform="translate(480, 80)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="rgba(0,0,0,0.2)"/>

    <!-- Grid lines -->
    <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
      <line x1="40" y1="30" x2="40" y2="150"/>
      <line x1="100" y1="30" x2="100" y2="150"/>
      <line x1="160" y1="30" x2="160" y2="150"/>
      <line x1="220" y1="30" x2="220" y2="150"/>
      <line x1="40" y1="60" x2="260" y2="60"/>
      <line x1="40" y1="90" x2="260" y2="90"/>
      <line x1="40" y1="120" x2="260" y2="120"/>
    </g>

    <!-- IV Rank bar -->
    <rect x="60" y="50" width="30" height="90" fill="#06b6d4" opacity="0.7"/>
    <!-- IV Percentile bar -->
    <rect x="120" y="35" width="30" height="105" fill="#66cc99" opacity="0.8"/>
    <!-- Current IV bar -->
    <rect x="180" y="70" width="30" height="70" fill="#ffd700" opacity="0.7"/>

    <text x="75" y="165" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">IV Rank</text>
    <text x="135" y="165" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">IV %ile</text>
    <text x="195" y="165" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Current</text>
  </g>

  <!-- Comparison box -->
  <g transform="translate(480, 280)">
    <rect x="0" y="0" width="280" height="120" rx="10" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="1"/>
    <text x="140" y="25" font-family="Arial, sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle" font-weight="bold">IV-RANK VS IV-PERZENTIL</text>

    <rect x="20" y="45" width="100" height="25" rx="5" fill="#06b6d4"/>
    <text x="70" y="63" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">IV-RANK: 75</text>

    <rect x="160" y="45" width="100" height="25" rx="5" fill="#66cc99"/>
    <text x="210" y="63" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">IV-%ile: 85</text>

    <text x="140" y="100" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Unterschied verstehen = bessere Trades</text>
  </g>

  <!-- Title -->
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="28" fill="white" font-weight="bold">IV-Rank und</text>
  <text x="40" y="145" font-family="Arial, sans-serif" font-size="28" fill="white" font-weight="bold">IV-Perzentil</text>
  <text x="40" y="195" font-family="Arial, sans-serif" font-size="24" fill="#06b6d4">richtig interpretieren</text>

  <!-- Decorative line -->
  <rect x="40" y="215" width="180" height="4" fill="url(#iv)" rx="2"/>

  <!-- Key insights -->
  <g fill="white" font-family="Arial, sans-serif" font-size="14">
    <circle cx="50" cy="270" r="4" fill="#06b6d4"/>
    <text x="65" y="275">Wann ist IV "hoch"?</text>
    <circle cx="50" cy="305" r="4" fill="#66cc99"/>
    <text x="65" y="310">Unterschied in der Berechnung</text>
    <circle cx="50" cy="340" r="4" fill="#ffd700"/>
    <text x="65" y="345">Praktische Anwendung</text>
  </g>

  <!-- Bottom tag -->
  <rect x="40" y="390" width="130" height="35" rx="17" fill="url(#iv)"/>
  <text x="105" y="413" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">ANALYSE</text>
</svg>