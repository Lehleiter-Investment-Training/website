<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="warning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg9)"/>

  <!-- Warning pattern -->
  <g opacity="0.1">
    <polygon points="100,400 150,320 200,400" fill="#ffd700"/>
    <polygon points="700,350 750,270 800,350" fill="#ffd700"/>
    <polygon points="650,100 700,20 750,100" fill="#ffd700"/>
  </g>

  <!-- Error list -->
  <g transform="translate(480, 80)">
    <rect x="0" y="0" width="280" height="280" rx="12" fill="rgba(0,0,0,0.3)"/>
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="14" fill="#ffd700" font-weight="bold">TOP FEHLER:</text>

    <g fill="white" font-family="Arial, sans-serif" font-size="13">
      <text x="20" y="70"><tspan fill="#ef4444">1.</tspan> Kein Stop-Loss</text>
      <text x="20" y="100"><tspan fill="#ef4444">2.</tspan> Überhandeln</text>
      <text x="20" y="130"><tspan fill="#ef4444">3.</tspan> Keine Strategie</text>
      <text x="20" y="160"><tspan fill="#ef4444">4.</tspan> Emotionale Trades</text>
      <text x="20" y="190"><tspan fill="#ef4444">5.</tspan> Ignorieren von Kosten</text>
      <text x="20" y="220"><tspan fill="#ef4444">6.</tspan> Falsches Timing</text>
      <text x="20" y="250"><tspan fill="#ef4444">7.</tspan> Mangelnde Diversifikation</text>
    </g>
  </g>

  <!-- Big X marks -->
  <g stroke="#ef4444" stroke-width="4" opacity="0.3">
    <line x1="600" y1="370" x2="650" y2="420"/>
    <line x1="650" y1="370" x2="600" y2="420"/>
  </g>
  <g stroke="#ef4444" stroke-width="3" opacity="0.2">
    <line x1="720" y1="380" x2="760" y2="420"/>
    <line x1="760" y1="380" x2="720" y2="420"/>
  </g>

  <!-- Title -->
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="30" fill="white" font-weight="bold">Die häufigsten</text>
  <text x="40" y="145" font-family="Arial, sans-serif" font-size="30" fill="white" font-weight="bold">Anfängerfehler</text>
  <text x="40" y="195" font-family="Arial, sans-serif" font-size="26" fill="#ffd700">im Optionshandel</text>

  <!-- Decorative line -->
  <rect x="40" y="215" width="200" height="4" fill="url(#warning)" rx="2"/>

  <!-- Checkmark section -->
  <g transform="translate(40, 250)">
    <rect x="0" y="0" width="380" height="100" rx="10" fill="rgba(102,204,153,0.15)" stroke="#66cc99" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="#66cc99" font-weight="bold">SO VERMEIDEN SIE DIESE:</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="white">Klare Regeln aufstellen</text>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="13" fill="white">Disziplin bewahren</text>
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="13" fill="white">Trading-Journal führen</text>
    <text x="200" y="80" font-family="Arial, sans-serif" font-size="13" fill="white">Kontinuierlich lernen</text>
  </g>

  <!-- Bottom tag -->
  <rect x="40" y="390" width="120" height="35" rx="17" fill="url(#warning)"/>
  <text x="100" y="413" font-family="Arial, sans-serif" font-size="14" fill="#7f1d1d" text-anchor="middle" font-weight="bold">FEHLER</text>
</svg>