<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366"/>
      <stop offset="100%" style="stop-color:#1a5490"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66cc99"/>
      <stop offset="100%" style="stop-color:#4db380"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="700" cy="350" r="80" fill="rgba(255,255,255,0.03)"/>
  <circle cx="100" cy="400" r="100" fill="rgba(255,255,255,0.04)"/>

  <!-- Chart lines representing options -->
  <g stroke="url(#accent1)" stroke-width="3" fill="none" opacity="0.8">
    <path d="M 50 350 L 200 350 L 280 280 L 400 280"/>
    <path d="M 50 300 L 150 300 L 250 220 L 400 220" stroke-dasharray="8,4"/>
  </g>

  <!-- Call/Put Icons -->
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="rgba(102,204,153,0.2)" stroke="#66cc99" stroke-width="2"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="14" fill="#66cc99" text-anchor="middle" font-weight="bold">CALL</text>
    <path d="M 40 55 L 60 40 L 80 55" stroke="#66cc99" stroke-width="3" fill="none"/>
  </g>

  <g transform="translate(640, 150)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="2"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold">PUT</text>
    <path d="M 40 45 L 60 60 L 80 45" stroke="#ef4444" stroke-width="3" fill="none"/>
  </g>

  <!-- Title area -->
  <rect x="40" y="100" width="400" height="4" fill="url(#accent1)" rx="2"/>
  <text x="40" y="160" font-family="Arial, sans-serif" font-size="28" fill="white" font-weight="bold">Grundlegende</text>
  <text x="40" y="200" font-family="Arial, sans-serif" font-size="28" fill="white" font-weight="bold">Optionsstrategien</text>
  <text x="40" y="240" font-family="Arial, sans-serif" font-size="24" fill="#66cc99">für Einsteiger</text>

  <!-- Bottom tag -->
  <rect x="40" y="380" width="140" height="35" rx="17" fill="url(#accent1)"/>
  <text x="110" y="403" font-family="Arial, sans-serif" font-size="14" fill="#003366" text-anchor="middle" font-weight="bold">STRATEGIE</text>
</svg>