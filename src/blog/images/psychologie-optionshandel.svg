<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg7)"/>

  <!-- Neural network pattern -->
  <g stroke="rgba(168,85,247,0.2)" stroke-width="1" fill="none">
    <circle cx="600" cy="150" r="30"/>
    <circle cx="680" cy="100" r="20"/>
    <circle cx="720" cy="180" r="25"/>
    <circle cx="650" cy="220" r="22"/>
    <circle cx="580" cy="80" r="18"/>
    <line x1="600" y1="150" x2="680" y2="100"/>
    <line x1="600" y1="150" x2="720" y2="180"/>
    <line x1="600" y1="150" x2="650" y2="220"/>
    <line x1="680" y1="100" x2="580" y2="80"/>
    <line x1="720" y1="180" x2="650" y2="220"/>
  </g>

  <!-- Brain icon -->
  <g transform="translate(550, 140)">
    <ellipse cx="80" cy="60" rx="60" ry="50" fill="url(#brain)" opacity="0.3"/>
    <path d="M 50 60 Q 60 30 80 35 Q 100 30 110 60 Q 120 90 80 100 Q 40 90 50 60"
          fill="none" stroke="url(#brain)" stroke-width="3"/>
    <line x1="80" y1="35" x2="80" y2="100" stroke="url(#brain)" stroke-width="2" stroke-dasharray="4,2"/>
  </g>

  <!-- Warning triangles -->
  <g transform="translate(650, 280)">
    <polygon points="30,0 60,50 0,50" fill="none" stroke="#ffd700" stroke-width="2"/>
    <text x="30" y="40" font-family="Arial, sans-serif" font-size="24" fill="#ffd700" text-anchor="middle">!</text>
  </g>
  <g transform="translate(710, 300)">
    <polygon points="20,0 40,35 0,35" fill="none" stroke="#ef4444" stroke-width="2"/>
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="18" fill="#ef4444" text-anchor="middle">!</text>
  </g>

  <!-- Trap icons -->
  <g transform="translate(520, 340)">
    <rect x="0" y="0" width="220" height="70" rx="10" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">FOMO</text>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffd700">Overconfidence</text>
    <text x="160" y="25" font-family="Arial, sans-serif" font-size="12" fill="#a855f7">Bias</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="12" fill="#66cc99">Verlustaversion</text>
    <text x="120" y="55" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">Panik</text>
  </g>

  <!-- Title -->
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="30" fill="white" font-weight="bold">Psychologische Fallen</text>
  <text x="40" y="145" font-family="Arial, sans-serif" font-size="30" fill="white" font-weight="bold">im Optionshandel</text>
  <text x="40" y="190" font-family="Arial, sans-serif" font-size="26" fill="#a855f7">vermeiden</text>

  <!-- Decorative line -->
  <rect x="40" y="210" width="200" height="4" fill="url(#brain)" rx="2"/>

  <!-- Tips -->
  <g fill="white" font-family="Arial, sans-serif" font-size="15" opacity="0.9">
    <circle cx="50" cy="270" r="4" fill="#66cc99"/>
    <text x="65" y="275">Emotionen erkennen</text>
    <circle cx="50" cy="305" r="4" fill="#66cc99"/>
    <text x="65" y="310">Rational handeln</text>
    <circle cx="50" cy="340" r="4" fill="#66cc99"/>
    <text x="65" y="345">Disziplin bewahren</text>
  </g>

  <!-- Bottom tag -->
  <rect x="40" y="390" width="150" height="35" rx="17" fill="url(#brain)"/>
  <text x="115" y="413" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">PSYCHOLOGIE</text>
</svg>