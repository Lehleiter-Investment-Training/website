<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="margin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg8)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>

  <!-- Leverage bar chart -->
  <g transform="translate(500, 100)">
    <rect x="0" y="100" width="50" height="80" fill="#3b82f6" opacity="0.7"/>
    <rect x="70" y="60" width="50" height="120" fill="#3b82f6" opacity="0.85"/>
    <rect x="140" y="20" width="50" height="160" fill="#3b82f6"/>
    <text x="25" y="200" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">1x</text>
    <text x="95" y="200" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">2x</text>
    <text x="165" y="200" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">5x</text>
    <text x="95" y="230" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">HEBEL</text>
  </g>

  <!-- Balance scale icon -->
  <g transform="translate(550, 290)">
    <line x1="75" y1="0" x2="75" y2="80" stroke="#66cc99" stroke-width="3"/>
    <line x1="25" y1="20" x2="125" y2="20" stroke="#66cc99" stroke-width="3"/>
    <ellipse cx="25" cy="40" rx="25" ry="15" fill="none" stroke="#66cc99" stroke-width="2"/>
    <ellipse cx="125" cy="35" rx="25" ry="15" fill="none" stroke="#ef4444" stroke-width="2"/>
    <text x="25" y="70" font-family="Arial, sans-serif" font-size="10" fill="#66cc99" text-anchor="middle">Chance</text>
    <text x="125" y="65" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Risiko</text>
  </g>

  <!-- Title -->
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="32" fill="white" font-weight="bold">Marginhandel</text>
  <text x="40" y="145" font-family="Arial, sans-serif" font-size="32" fill="white" font-weight="bold">verstehen:</text>
  <text x="40" y="195" font-family="Arial, sans-serif" font-size="26" fill="#3b82f6">Chancen und Risiken</text>

  <!-- Info box -->
  <g transform="translate(40, 230)">
    <rect x="0" y="0" width="380" height="120" rx="10" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">Kernkonzepte:</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Initial Margin vs Maintenance Margin</text>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Margin Call verstehen und vermeiden</text>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Hebelwirkung richtig einsetzen</text>
  </g>

  <!-- Bottom tag -->
  <rect x="40" y="390" width="120" height="35" rx="17" fill="url(#margin)"/>
  <text x="100" y="413" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">MARGIN</text>
</svg>