<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366"/>
      <stop offset="100%" style="stop-color:#004080"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66cc99"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#66cc99"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg3)"/>

  <!-- Volatility wave pattern -->
  <g fill="none" stroke="url(#wave)" stroke-width="3">
    <path d="M 0 250 Q 50 180 100 250 T 200 250 T 300 250 T 400 250 T 500 250 T 600 250 T 700 250 T 800 250" opacity="0.3"/>
    <path d="M 0 280 Q 80 150 160 280 T 320 280 T 480 280 T 640 280 T 800 280" opacity="0.5"/>
    <path d="M 0 310 Q 100 120 200 310 T 400 310 T 600 310 T 800 310" opacity="0.8"/>
  </g>

  <!-- Up/Down arrows representing volatility -->
  <g transform="translate(550, 80)">
    <polygon points="40,0 80,50 60,50 60,100 20,100 20,50 0,50" fill="#66cc99" opacity="0.8"/>
  </g>
  <g transform="translate(650, 100)">
    <polygon points="40,100 80,50 60,50 60,0 20,0 20,50 0,50" fill="#ffd700" opacity="0.8"/>
  </g>

  <!-- Chart with volatility -->
  <g transform="translate(500, 250)">
    <rect x="0" y="0" width="250" height="150" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <polyline points="20,120 60,80 100,100 140,40 180,70 220,30" fill="none" stroke="#66cc99" stroke-width="3"/>
    <text x="125" y="170" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Volatilitätskurve</text>
  </g>

  <!-- Title -->
  <text x="40" y="130" font-family="Arial, sans-serif" font-size="30" fill="white" font-weight="bold">Wie man Volatilität</text>
  <text x="40" y="175" font-family="Arial, sans-serif" font-size="30" fill="white" font-weight="bold">für bessere Renditen</text>
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="30" fill="#ffd700" font-weight="bold">nutzt</text>

  <!-- Decorative line -->
  <rect x="40" y="240" width="200" height="4" fill="url(#wave)" rx="2"/>

  <!-- Bottom tag -->
  <rect x="40" y="380" width="140" height="35" rx="17" fill="#ffd700"/>
  <text x="110" y="403" font-family="Arial, sans-serif" font-size="14" fill="#003366" text-anchor="middle" font-weight="bold">VOLATILITÄT</text>
</svg>